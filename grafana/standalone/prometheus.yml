# Prometheus Configuration for AI Gateway
# Reference copy of the Prometheus scrape configuration.
# The live config is managed by the infrastructure compose stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-gateway-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'ai-gateway'
    static_configs:
      - targets: ['ai-gateway:8088']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'dcgm'
    static_configs:
      - targets: ['dcgm_exporter:9400']

  - job_name: 'amd_gpu'
    metrics_path: /metrics
    static_configs:
      - targets: ['device-metrics-exporter:5000']

  - job_name: 'qdrant'
    metrics_path: /metrics
    static_configs:
      - targets: ['qdrant:6333']
